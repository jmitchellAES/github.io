<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lighting ROI Calculator</title>

<style>
  :root{
    --brand:#0a5c7d;
    --bg:#f4f6f8;
    --card:#ffffff;
    --border:#d9dee3;
    --soft:#f8fafc;
  }
  body{
    font-family: Arial, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 24px;
  }
  .container{
    max-width: 1040px;
    margin: auto;
    background: var(--card);
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 8px 26px rgba(0,0,0,.08);
  }

  .header{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:16px;
  }
  .logo{ max-height:62px; }
  .page-title{
    flex:1;
    text-align:center;
    font-size:32px;
    font-weight:800;
    color:var(--brand);
    margin:0;
  }
  .header-spacer{ width:62px; }

  label{ font-size:13px; font-weight:bold; }
  input{
    width:100%;
    padding:10px;
    margin:6px 0 14px;
    border-radius:10px;
    border:1px solid var(--border);
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
  }
  .panel{
    border:1px solid var(--border);
    background:var(--soft);
    border-radius:12px;
    padding:14px;
    margin-bottom:14px;
  }
  .row{ display:flex; gap:10px; flex-wrap:wrap; }

  button{
    padding:10px 16px;
    border-radius:10px;
    border:none;
    font-weight:bold;
    cursor:pointer;
  }
  .primary{ background:var(--brand); color:#fff; }
  .secondary{ background:#e8eef3; color:var(--brand); }

  table{
    width:100%;
    border-collapse:collapse;
    margin-top:16px;
  }
  th,td{
    border:1px solid #ccc;
    padding:10px;
  }
  th{ background:#f0f3f6; }

  .footer{
    margin-top:14px;
    font-size:12px;
    border-top:1px solid #ddd;
    padding-top:12px;
  }
</style>

https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.jsscript>
https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.jsscript>
</head>

<body>
<div class="container">

<div class="header">
  aes-logo.png
  <h1 class="page-title">Lighting ROI Calculator</h1>
  <div class="header-spacer"></div>
</div>

<button class="secondary" id="btnPdf">PDF Report</button>

<script>
(function(){

const COLORS = {
  brand:"#0a5c7d",
  rebate:"#22c55e",
  zero:"#dc2626",
  grid:"rgba(0,0,0,0.06)"
};

function generatePdfReport(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:"mm", format:"letter" });
  doc.setFont("times","normal");
  doc.setFontSize(11);

  const dateStr = new Date().toLocaleDateString();
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();

  /* ===== COVER ===== */
  doc.addImage("aes-logo.png","PNG",(pageW-70)/2,(pageH/2)-40,70,26);
  doc.setFont("times","bold"); doc.setFontSize(18);
  doc.text("Project Name",pageW/2,(pageH/2),{align:"center"});
  doc.setFont("times","normal"); doc.setFontSize(12);
  doc.text(dateStr,pageW/2,(pageH/2)+10,{align:"center"});

  /* ===== PAGE 2 — DATA ===== */
  doc.addPage();
  let y = 36;

  function section(t){
    doc.setFillColor(240,243,246);
    doc.rect(12,y,192,8,"F");
    doc.setFont("times","bold");
    doc.text(t,14,y+5.5);
    doc.setFont("times","normal");
    y += 14;
  }
  function row(l,v){
    doc.text(l,14,y);
    doc.text(v,120,y);
    y += 6.5;
  }

  section("Fixtures");
  row("Existing Fixtures:","50 @ 400W");
  row("Recommended Fixtures:","50 @ 150W");

  section("Project Costs");
  row("Fixture Cost:","$8,500");
  row("Labor Cost:","$0");
  row("Controls Cost:","$1,000");

  section("Rebates");
  row("Fixture Rebate:","$0");
  row("Controls Rebate:","$0");

  section("Project Cost Summary");
  row("Total (No Rebates):","$9,500");
  row("Total (With Rebates):","$9,500");

  section("Results");
  row("Annual kWh Saved:","86,231 kWh");
  row("Annual Savings:","$10,589 / year");
  row("ROI (Simple Payback):","0.90 years");

  /* ===== PAGE 3 — CHARTS ===== */
  doc.addPage();
  y = 36;

  /* ZERO LINE PLUGIN */
  const zeroLinePlugin = {
    id:"zeroLine",
    afterDraw(chart){
      const yScale = chart.scales.y;
      const xScale = chart.scales.x;
      if(!yScale) return;

      const yZero = yScale.getPixelForValue(0);
      const ctx = chart.ctx;

      ctx.save();
      ctx.strokeStyle = COLORS.zero;
      ctx.setLineDash([6,4]);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(xScale.left, yZero);
      ctx.lineTo(xScale.right, yZero);
      ctx.stroke();
      ctx.restore();
    }
  };

  section("ROI Graph (0–5 Years)");

  const roiCanvas = document.createElement("canvas");
  roiCanvas.width = 1000;
  roiCanvas.height = 520;

  new Chart(roiCanvas.getContext("2d"),{
    type:"line",
    data:{
      datasets:[
        {
          label:"No Rebates",
          data:[{x:0,y:-9500},{x:1,y:0},{x:2,y:10000},{x:3,y:20000},{x:4,y:30000},{x:5,y:40000}],
          parsing:false,
          borderColor:COLORS.brand,
          borderWidth:2,
          pointRadius:0
        },
        {
          label:"With Rebates",
          data:[{x:0,y:-8500},{x:1,y:2000},{x:2,y:12000},{x:3,y:22000},{x:4,y:32000},{x:5,y:42000}],
          parsing:false,
          borderColor:COLORS.rebate,
          borderWidth:2,
          pointRadius:0
        }
      ]
    },
    plugins:[zeroLinePlugin],
    options:{
      responsive:false,
      animation:false,
      plugins:{
        legend:{labels:{font:{size:10}}},
        title:{display:true,text:"Return on Investment (0–5 Years)",font:{size:12}}
      },
      scales:{
        x:{
          type:"linear",
          min:0,
          max:5,
          grid:{color:COLORS.grid},
          ticks:{font:{size:9}},
          title:{display:true,text:"Years",font:{size:10}}
        },
        y:{
          grid:{color:COLORS.grid},
          ticks:{font:{size:9}},
          title:{display:true,text:"Cumulative Cash Flow ($)",font:{size:10}}
        }
      }
    }
  });

  doc.addImage(roiCanvas.toDataURL(),"PNG",12,y,192,95);
  doc.save("Project AES ROI.pdf");
}

document.getElementById("btnPdf").onclick = generatePdfReport;
})();
</script>

</div>
</body>
</html>
