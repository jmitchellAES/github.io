<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lighting ROI Calculator</title>
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<meta http-equiv="pragma" content="no-cache" />

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 24px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #fff;
  padding: 24px;
  border-radius: 10px;
}

h1 { margin-top: 0; }

.build {
  font-size: 12px;
  color: #555;
  margin-bottom: 10px;
}

label { font-size: 13px; font-weight: bold; }

input {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  margin-bottom: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

button {
  padding: 10px 16px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.primary { background: #0a5c7d; color: #fff; }
.secondary { background: #e8eef3; color: #0a5c7d; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: left;
}

th { background: #f0f3f6; }

.warn {
  margin-top: 12px;
  padding: 10px;
  border-radius: 8px;
  background: #fffbeb;
  border: 1px solid #fcd34d;
  color: #92400e;
  font-size: 12px;
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <div class="build">Build ID: <b id="buildId">2026-03-28-A</b></div>

  <h1>Lighting ROI Calculator</h1>

  <div class="grid">
    <div>
      <label>Number of Fixtures</label>
      <input id="qty" type="number" value="50">
    </div>
    <div>
      <label>Old Wattage (W)</label>
      <input id="oldW" type="number" value="400">
    </div>
    <div>
      <label>New Wattage (W)</label>
      <input id="newW" type="number" value="150">
    </div>

    <div>
      <label>Hours Per Day</label>
      <input id="hours" type="number" value="12">
    </div>
    <div>
      <label>Days Per Year</label>
      <input id="days" type="number" value="365">
    </div>
    <div>
      <label>Electric Rate ($/kWh)</label>
      <input id="rate" type="number" step="0.0001" value="0.1228">
    </div>

    <div>
      <label>Fixture Cost ($)</label>
      <input id="fixtureCost" type="number" value="8500">
    </div>
    <div>
      <label>Controls Cost ($)</label>
      <input id="controlsCost" type="number" value="1000">
    </div>
    <div>
      <label>Rebates ($)</label>
      <input id="rebate" type="number" value="0">
    </div>
  </div>

  <button class="primary" id="btnCalc" type="button">Calculate</button>
  <button class="secondary" id="btnPrint" type="button">Print / Save as PDF</button>

  <div class="warn" id="warn"></div>

  <table>
    <tr>
      <th></th>
      <th>Fixtures Only</th>
      <th>Fixtures + Controls</th>
    </tr>
    <tr>
      <td>Annual Savings</td>
      <td id="sFixtures">—</td>
      <td id="sControls">—</td>
    </tr>
    <tr>
      <td>Net Project Cost</td>
      <td id="cFixtures">—</td>
      <td id="cControls">—</td>
    </tr>
    <tr>
      <td>Simple Payback</td>
      <td id="pFixtures">—</td>
      <td id="pControls">—</td>
    </tr>
  </table>
</div>

<script>
function money(n) { return "$" + Math.round(n).toLocaleString(); }

function showWarn(msg){
  const w = document.getElementById("warn");
  w.style.display = "block";
  w.textContent = msg;
}

function clearWarn(){
  const w = document.getElementById("warn");
  w.style.display = "none";
  w.textContent = "";
}

function calculate() {
  clearWarn();

  const qty = Number(document.getElementById("qty").value);
  const oldW = Number(document.getElementById("oldW").value);
  const newW = Number(document.getElementById("newW").value);
  const hrs = Number(document.getElementById("hours").value);
  const days = Number(document.getElementById("days").value);
  const rate = Number(document.getElementById("rate").value);

  const fixtureCost = Number(document.getElementById("fixtureCost").value);
  const controlsCost = Number(document.getElementById("controlsCost").value);
  const rebate = Number(document.getElementById("rebate").value);

  if(!(qty > 0) || [oldW,newW,hrs,days,rate,fixtureCost,controlsCost,rebate].some(x => Number.isNaN(x))){
    showWarn("Please enter valid numbers.");
    return;
  }

  const oldKwh = qty * oldW * hrs * days / 1000;
  const newKwh = qty * newW * hrs * days / 1000;

  const fixtureSavings = (oldKwh - newKwh) * rate;
  const controlsSavings = fixtureSavings * 0.20; // unchanged baseline uplift

  const netFixtureCost = Math.max(0, fixtureCost - rebate);
  const netControlsCost = Math.max(0, fixtureCost + controlsCost - rebate);

  document.getElementById("sFixtures").innerText = money(fixtureSavings) + " / year";
  document.getElementById("sControls").innerText = money(fixtureSavings + controlsSavings) + " / year";

  document.getElementById("cFixtures").innerText = money(netFixtureCost);
  document.getElementById("cControls").innerText = money(netControlsCost);

  document.getElementById("pFixtures").innerText =
    (netFixtureCost / fixtureSavings).toFixed(2) + " years";

  document.getElementById("pControls").innerText =
    (netControlsCost / (fixtureSavings + controlsSavings)).toFixed(2) + " years";
}

document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("btnCalc").addEventListener("click", calculate);
  document.getElementById("btnPrint").addEventListener("click", function(){ window.print(); });
});
</script>

</body>
</html>
