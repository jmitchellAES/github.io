<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lighting ROI Calculator</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 24px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #fff;
  padding: 24px;
  border-radius: 10px;
}

h1 {
  margin-top: 0;
}

label {
  font-size: 13px;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  margin-bottom: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

button {
  padding: 10px 16px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.primary {
  background: #0a5c7d;
  color: #fff;
}

.secondary {
  background: #e8eef3;
  color: #0a5c7d;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: left;
}

th {
  background: #f0f3f6;
}
</style>
</head>

<body>

<div class="container">
  <h1>Lighting ROI Calculator</h1>

  <div class="grid">
    <div>
      <label>Number of Fixtures</label>
      <input id="qty" type="number" value="50">
    </div>
    <div>
      <label>Old Wattage (W)</label>
      <input id="oldW" type="number" value="400">
    </div>
    <div>
      <label>New Wattage (W)</label>
      <input id="newW" type="number" value="150">
    </div>

    <div>
      <label>Hours Per Day</label>
      <input id="hours" type="number" value="12">
    </div>
    <div>
      <label>Days Per Year</label>
      <input id="days" type="number" value="365">
    </div>
    <div>
      <label>Electric Rate ($/kWh)</label>
      <input id="rate" type="number" step="0.0001" value="0.1228">
    </div>

    <div>
      <label>Fixture Cost ($)</label>
      <input id="fixtureCost" type="number" value="8500">
    </div>
    <div>
      <label>Controls Cost ($)</label>
      <input id="controlsCost" type="number" value="1000">
    </div>
    <div>
      <label>Rebates ($)</label>
      <input id="rebate" type="number" value="0">
    </div>
  </div>

  <button class="primary" onclick="calculate()">Calculate</button>
  <button class="secondary" onclick="window.print()">Print / Save as PDF</button>

  <table>
    <tr>
      <th></th>
      <th>Fixtures Only</th>
      <th>Fixtures + Controls</th>
    </tr>
    <tr>
      <td>Annual Savings</td>
      <td id="sFixtures">—</td>
      <td id="sControls">—</td>
    </tr>
    <tr>
      <td>Net Project Cost</td>
      <td id="cFixtures">—</td>
      <td id="cControls">—</td>
    </tr>
    <tr>
      <td>Simple Payback</td>
      <td id="pFixtures">—</td>
      <td id="pControls">—</td>
    </tr>
  </table>
</div>

<script>
function money(n) {
  return "$" + Math.round(n).toLocaleString();
}

function calculate() {
  const qty = +qty.value;
  const oldW = +oldW.value;
  const newW = +newW.value;
  const hrs = +hours.value;
  const days = +days.value;
  const rate = +rate.value;

  const fixtureCost = +fixtureCost.value;
  const controlsCost = +controlsCost.value;
  const rebate = +rebate.value;

  const oldKwh = qty * oldW * hrs * days / 1000;
  const newKwh = qty * newW * hrs * days / 1000;

  const fixtureSavings = (oldKwh - newKwh) * rate;
  const controlsSavings = fixtureSavings * 0.20; // simple uplift

  const netFixtureCost = Math.max(0, fixtureCost - rebate);
  const netControlsCost = Math.max(0, fixtureCost + controlsCost - rebate);

  sFixtures.innerText = money(fixtureSavings) + " / year";
  sControls.innerText = money(fixtureSavings + controlsSavings) + " / year";

  cFixtures.innerText = money(netFixtureCost);
  cControls.innerText = money(netControlsCost);

  pFixtures.innerText = (netFixtureCost / fixtureSavings).toFixed(2) + " years";
  pControls.innerText = (netControlsCost / (fixtureSavings + controlsSavings)).toFixed(2) + " years";
}
</script>

</body>
</html>
``
