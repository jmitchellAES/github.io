<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lighting ROI Calculator</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 24px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #fff;
  padding: 24px;
  border-radius: 10px;
}

h1 {
  margin-top: 0;
}

label {
  font-size: 13px;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  margin-bottom: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

button {
  padding: 10px 16px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.primary {
  background: #0a5c7d;
  color: #fff;
}

.secondary {
  background: #e8eef3;
  color: #0a5c7d;
}

.panel {
  border: 1px solid #ddd;
  background: #fafafa;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 14px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: left;
}

th {
  background: #f0f3f6;
}

.small {
  font-size: 12px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">
  <h1>Lighting ROI Calculator</h1>

  <div class="grid">
    <div style="grid-column: span 3;">
      <label>Project Name</label>
      <input id="projectName" type="text">
    </div>
  </div>

  <div class="grid">
    <div>
      <label>Number of Fixtures</label>
      <input id="qty" type="number" value="50">
    </div>
    <div>
      <label>Old Wattage (W)</label>
      <input id="oldW" type="number" value="400">
    </div>
    <div>
      <label>New Wattage (W)</label>
      <input id="newW" type="number" value="150">
    </div>

    <div>
      <label>Hours Per Day</label>
      <input id="hours" type="number" value="12">
    </div>
    <div>
      <label>Days Per Year</label>
      <input id="days" type="number" value="365">
    </div>
    <div>
      <label>Electric Rate ($/kWh)</label>
      <input id="rate" type="number" step="0.0001" value="0.1228">
    </div>

    <div>
      <label>Fixture Cost ($)</label>
      <input id="fixtureCost" type="number" value="8500">
    </div>
    <div>
      <label>Controls Cost ($)</label>
      <input id="controlsCost" type="number" value="1000">
    </div>
    <div>
      <label>Rebates ($)</label>
      <input id="rebate" type="number" value="0">
    </div>
  </div>

  <div class="panel">
    <label>
      <input type="checkbox" id="useControls" onchange="toggleControls()"> Add Controls
    </label>
